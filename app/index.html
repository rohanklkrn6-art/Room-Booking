<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Timetable — TH Rosenheim</title>
    <style>
      #splash {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #E8821A;
        z-index: 9999;
        transition: opacity 0.3s ease 0.1s;
      }
      #splash.done { opacity: 0; pointer-events: none; }
      #splash-icon { font-size: 52px; animation: sp-pulse 0.9s ease-in-out infinite alternate; }
      @keyframes sp-pulse {
        from { transform: scale(0.9); opacity: 0.85; }
        to   { transform: scale(1.1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash"><span id="splash-icon">📅</span></div>
    <script>
      window.__hideSplash = function() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('done'); setTimeout(function() { s.remove(); }, 400); }
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
