.notif-dot{position:absolute;top:7px;right:calc(50% - 18px);width:7px;height:7px;background:#e53e3e;border-radius:50%}

.sheet{background:white;width:340px;min-height:260px;max-height:86vh;border-radius:20px 20px 0 0;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s ease;padding-bottom:24px}
.overlay.open .sheet{transform:translateY(0)}

.sh-sec{padding:0 16px;margin-bottom:12px}
.sh-lbl{font-size:10px;color:#999;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px}

.st-opt.sel{border-color:var(--or);background:var(--or-lt)}

.btn-sec{flex:1;padding:10px;border:1px solid #ddd;border-radius:9px;font-size:13px;font-weight:600;background:white;cursor:pointer;font-family:'Inter',sans-serif}

.live-dot{display:inline-block;width:7px;height:7px;background:#22c55e;border-radius:50%;margin-right:4px;animation:pulse 1.5s infinite}

.sh-rm-hdr{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:flex-start}
.sh-rm-name{font-size:18px;font-weight:700}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1a1a1a;color:white;padding:9px 16px;border-radius:18px;font-size:12px;font-weight:500;z-index:999;transition:transform 0.3s ease;white-space:nowrap;font-family:'Inter',sans-serif;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>

function fmtDate(d){
  var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate()+' '+mn[d.getMonth()];
}
function isToday(d){
  return d.getFullYear()===TODAY_REF.getFullYear()&&d.getMonth()===TODAY_REF.getMonth()&&d.getDate()===TODAY_REF.getDate();
}
function isTodayWeek(){ return S.wkOff===0; }

    '</div><div class="cal-days">';
  for(var i=0;i<7;i++){

function renderTT(){

  }
  var ws=getWkStart(S.wkOff);
  var selDate=new Date(ws.getTime()+S.selDay*86400000);
  var cutoff=new Date(2026,6,11);
  if(selDate>=cutoff){
    h+='<div class="no-res">🎓<br><br>Semester ends July 10</div></div>';
    return h;
  }
  var lects=LECTS[S.selDay]||[];
  var isCurWk=isTodayWeek();
  var hasCan=false,canRoom='';
  if(isCurWk){ for(var i=0;i<lects.length;i++){ if(getLectSt(lects[i])==='cancelled'){hasCan=true;if(!canRoom)canRoom=lects[i].room;} } }
  if(isCurWk&&hasCan){
    h+='<div class="alert" onclick="showFreeRoom(\''+canRoom+'\')"><span>⚠️ '+canRoom+' is free – lecture cancelled</span><span style="color:var(--or);font-weight:700">→</span></div>';
  }
  if(!lects.length){
    h+='<div class="no-res">📅<br><br>No lectures scheduled</div></div>';

  h+='<div class="tt-outer"><div class="tt-wrap"><div class="tt-time-col">';
  for(var hh=9;hh<=17;hh++){
    h+='<div class="tt-time-lbl">'+(hh<10?'0'+hh:hh)+':00</div>';
  }
  h+='</div><div class="tt-grid">';
  for(var gl=0;gl<=8;gl++){
    h+='<div class="tt-grid-line" style="top:'+(gl*68)+'px"></div>';
  }
  for(var j=0;j<lects.length;j++){
    var l=lects[j];
    var st=isCurWk?getLectSt(l):(S.wkOff<0?'happening':'upcoming');
    var sm=t2m(l.t),em=t2m(l.e);
    var top=m2top(sm),ht=dur2h(sm,em);
    h+='<div class="lb s-'+st+'" style="top:'+top+'px;height:'+ht+'px;" onclick="openLectSheet(\''+l.id+'\')">'+
      '<div class="lb-title">'+l.sub+'</div>'+
      '<div class="lb-room">'+l.room+'</div>'+
      '<span class="lb-badge">'+stLabel(st)+'</span>'+
      '</div>';
  }
  h+='</div></div></div></div>';
  return h;
}

function renderRooms(isProf){
  var h='<div class="content"><div class="rms-hdr">'+
    '<div class="srch-wrap">'+
    '<input class="srch-inp" id="rs" placeholder="🔍  Search rooms..." value="'+escHtml(S.rmSrch)+'" oninput="onRmSrch(this.value)">'+
    '<button class="srch-clr" id="sc" style="display:'+(S.rmSrch?'block':'none')+';" onclick="clrRmSrch()">✕</button>'+
    '</div>';

  h+='<div class="pill-row">';

    var bv=bldgs[i][0],bl=bldgs[i][1],bs=bldgs[i][2];
    h+='<button class="pill'+(S.rmBldg===bv?' active':'')+'" onclick="setRmBldg(\''+bv+'\')">'+bl+'<span class="pill-sub">'+bs+'</span></button>';
  }
  h+='</div>';

    '<div class="avail-tab'+(S.rmAvail===0?' active':'')+'" onclick="setRmAvail(0)">🟢 Free now</div>'+
    '<div class="avail-tab'+(S.rmAvail===1?' active':'')+'" onclick="setRmAvail(1)">📅 Free today</div>'+
    '</div>';
  var caps=[['all','All'],['small','≤ 25 seats'],['medium','26–50 seats'],['large','51+ seats']];
  h+='<div class="cap-row">';
  for(var k=0;k<caps.length;k++){
    h+='<button class="cap-btn'+(S.rmCap===caps[k][0]?' active':'')+'" onclick="setRmCap(\''+caps[k][0]+'\')">'+caps[k][1]+'</button>';
  }
  h+='</div></div>';
  var fil=filterRooms();
  var now=[],soon=[],later=[];
  for(var m=0;m<fil.length;m++){
    var rs=RS[fil[m].id];
    if(rs&&rs.st==='soon') soon.push(fil[m]);
    else if(rs&&rs.st==='occ') later.push(fil[m]);
    else now.push(fil[m]);
  }
  if(!fil.length){
    h+='<div class="no-res">🔍 No rooms found</div>';
  } else {
    if(now.length){
      h+='<div class="sec-title">Available now ('+now.length+')</div>';
      for(var n=0;n<now.length;n++) h+=renderRoomCard(now[n],isProf);
    }

      h+='<div class="sec-title">Soon free ('+soon.length+')</div>';
      for(var p=0;p<soon.length;p++) h+=renderRoomCard(soon[p],isProf);
    }
    if(later.length){
      h+='<div class="sec-title">Free later today ('+later.length+')</div>';
      for(var q=0;q<later.length;q++) h+=renderRoomCard(later[q],isProf);
    }
  }
  h+='</div>';
  return h;
}

function filterRooms(){
  var res=[];
  for(var i=0;i<ROOMS.length;i++){
    var r=ROOMS[i],rs=RS[r.id];
    if(!rs) continue;
    if(S.rmSrch){
      var q=S.rmSrch.toLowerCase();
      var fm=r.id.toLowerCase().indexOf(q)!==-1||r.type.toLowerCase().indexOf(q)!==-1;
      if(!fm){for(var fi=0;fi<r.feat.length;fi++){if(r.feat[fi].toLowerCase().indexOf(q)!==-1){fm=true;break;}}}
      if(!fm) continue;
    }
    if(S.rmBldg!=='all'&&r.b!==S.rmBldg) continue;
    if(S.rmCap==='small'&&r.cap>25) continue;
    if(S.rmCap==='medium'&&(r.cap<=25||r.cap>50)) continue;
    if(S.rmCap==='large'&&r.cap<=50) continue;
    if(S.rmAvail===0&&rs.st==='occ') continue;
    if(S.rmAvail===1&&rs.st==='occ'&&!rs.fu) continue;
    res.push(r);
  }
  return res;
}

    '<div class="occ-wrap"><div class="occ-bar '+bc+'" style="width:'+pct+'%"></div></div>'+
    '<div class="rc-stats"><span>'+rs.occ+'/'+r.cap+' occupied</span><span>'+fuTxt+'</span></div>'+

  for(var f=0;f<r.feat.length;f++) h+='<span class="feat-tag">'+featIcon(r.feat[f])+' '+r.feat[f]+'</span>';
  h+='</div>';
  if(grp){
    if(isProf){
      h+='<div class="grp-row"><div class="grp-info">👥 '+grp.sub+' · '+grp.mem+'/'+grp.max+'</div>'+

      }

    h+='<div style="margin-top:5px"><button class="btn-join" onclick="event.stopPropagation();openBkSheet(\''+r.id+'\')">Book room →</button></div>';

  if(rs.nl&&rs.nl!==rs.fu) h+='<div class="sh-sec"><span style="font-size:12px;color:#888">📅 Next lecture: <strong>'+rs.nl+'</strong></span></div>';
  var grp=null;
  for(var g=0;g<S.groups.length;g++){ if(S.groups[g].room===rid){grp=S.groups[g];break;} }
  if(isProf){
    h+='<div class="sh-btn-row"><button class="btn-send" onclick="closeSheet();openBkSheet(\''+rid+'\')">Book room →</button></div>';
  } else if(grp){
    if(grp.joined){
      h+='<div class="sh-btn-row"><button class="btn-sec" disabled style="opacity:0.5;cursor:default">✓ Joined</button></div>';
    } else {
      h+='<div class="sh-btn-row"><button class="btn-send" onclick="joinGrp(\''+grp.id+'\');closeSheet()">＋ Join group</button></div>';
    }
  }
  openSheet(h);
}

function openPrLectSheet(id){
  var l=findLect(id); if(!l) return;
  var cur=getLectSt(l);
  selProfStatus=cur;
  var h='<div class="sh-sec">'+
    '<div style="font-size:17px;font-weight:700;margin-bottom:4px">'+l.sub+'</div>'+
    '<div style="font-size:12px;color:#999">🕐 '+l.t+'–'+l.e+' · 📍 '+l.room+' · 👥 '+l.n+' students</div>'+
    '</div>'+
    '<div class="sh-sec"><div class="info-note">📢 Your update will be sent immediately to all students.</div></div>'+
    '<div class="sh-sec"><div class="sh-lbl">Update status</div><div class="sh-row">'+
    '<div class="st-opt'+(cur==='happening'?' sel':'')+'" id="so-h" onclick="pickSt(\'happening\')">✅<br>Happening</div>'+
    '<div class="st-opt'+(cur==='cancelled'?' sel':'')+'" id="so-c" onclick="pickSt(\'cancelled\')">✕<br>Cancelled</div>'+
    '<div class="st-opt'+(cur==='online'?' sel':'')+'" id="so-o" onclick="pickSt(\'online\')">💻<br>Online</div>'+
    '</div></div>'+
    '<div class="sh-sec"><div class="sh-lbl">Message (optional)</div>'+
    '<textarea class="sh-ta" id="pmsg" placeholder="Message to students..."></textarea></div>'+
    '<div class="sh-btn-row">'+
    '<button class="btn-sec" onclick="closeSheet()">Cancel</button>'+
    '<button class="btn-send" onclick="savePrSt(\''+id+'\')">Send</button>'+
    '</div>';
  openSheet(h);
}

function pickSt(st){
  selProfStatus=st;
  var ids=['so-h','so-c','so-o'],sts=['happening','cancelled','online'];
  for(var i=0;i<ids.length;i++){
    var el=document.getElementById(ids[i]);
    if(el) el.className='st-opt'+(sts[i]===st?' sel':'');
  }
}

function savePrSt(id){
  if(!selProfStatus){ showToast('Please select a status'); return; }
  S.lstatus[id]=selProfStatus;
  closeSheet();
  showToast('✓ Status updated — notification sent');
  var pc=document.getElementById('prcon');
  if(pc) pc.innerHTML=renderPrContent();
}

function openBkSheet(rid){
  var h='<div class="sh-sec"><div style="font-size:17px;font-weight:700;margin-bottom:3px">Book room '+rid+'</div>'+
    '<div style="font-size:12px;color:#999">Ad-hoc booking</div></div>'+
    '<div class="sh-sec"><div class="sh-lbl">Purpose</div>'+
    '<select class="sh-sel" id="bk-pur">'+
    '<option>Office hours</option><option>Extra lecture</option><option>Team meeting</option><option>Exam preparation</option>'+
    '</select></div>'+
    '<div class="sh-sec"><div class="sh-lbl">Start time</div>'+
    '<input class="sh-inp" id="bk-st" type="time" value="11:00"></div>'+
    '<div class="sh-sec"><div class="sh-lbl">Duration</div>'+
    '<select class="sh-sel" id="bk-dur">'+
    '<option>30 minutes</option><option selected>60 minutes</option><option>90 minutes</option><option>120 minutes</option>'+
    '</select></div>'+
    '<div class="sh-sec"><div class="sh-lbl">Note (optional)</div>'+
    '<textarea class="sh-ta" id="bk-note" placeholder="Optional note..."></textarea></div>'+
    '<div class="sh-btn-row">'+
    '<button class="btn-sec" onclick="closeSheet()">Cancel</button>'+
    '<button class="btn-send" onclick="confBk(\''+rid+'\')">Book</button>'+
    '</div>';
  openSheet(h);
}

function confBk(rid){
  var pur=document.getElementById('bk-pur').value;
  var st=document.getElementById('bk-st').value;
  var dur=document.getElementById('bk-dur').value;
  var prevSt=RS[rid]?RS[rid].st:'free';
  S.bookings.push({id:'b'+Date.now(),room:rid,purp:pur,start:st,dur:dur,prevSt:prevSt});
  if(RS[rid]){ RS[rid].st='occ'; }
  closeSheet();
  showToast('✓ Room '+rid+' booked');
  var pc=document.getElementById('prcon');
  if(pc) pc.innerHTML=renderPrContent();
}

function canBk(id){
  for(var i=0;i<S.bookings.length;i++){
    if(S.bookings[i].id===id){
      var rid=S.bookings[i].room;
      if(RS[rid]) RS[rid].st=S.bookings[i].prevSt||'free';
      S.bookings.splice(i,1);
      break;
    }
  }
  showToast('Booking cancelled');
  var pc=document.getElementById('prcon');
  if(pc) pc.innerHTML=renderPrContent();
}


function joinGrp(id){
  for(var i=0;i<S.groups.length;i++){
    if(S.groups[i].id===id){
      if(S.groups[i].joined) return;
      S.groups[i].joined=true;
      S.groups[i].mem++;
      S.grpDot=true;
      break;
    }
  }
  showToast('✓ Joined group');
  closeSheet();
  var sc=document.getElementById('stcon');
  if(sc){ sc.innerHTML=renderStContent(); updStNav(); }
}

function leaveGrp(id){
  for(var i=0;i<S.groups.length;i++){
    if(S.groups[i].id===id){ S.groups[i].joined=false; S.groups[i].mem=Math.max(0,S.groups[i].mem-1); break; }
  }
  showToast('Left group');
  var sc=document.getElementById('stcon');
  if(sc){ sc.innerHTML=renderStContent(); updStNav(); }
}

function stTab(idx){
  S.stTab=idx;
  if(idx===2) S.grpDot=false;
  var sc=document.getElementById('stcon');
  if(sc){ sc.innerHTML=renderStContent(); updStNav(); }
}

function showFreeRoom(roomId){
  S.rmSrch=roomId; S.rmAvail=0; S.rmBldg='all'; S.rmCap='all'; S.stTab=1;
  var sc=document.getElementById('stcon');
  if(sc){ sc.innerHTML=renderStContent(); updStNav(); }
}

function updStNav(){
  var items=document.querySelectorAll('.tab-item');
  if(items.length<3) return;
  for(var i=0;i<3;i++) items[i].className='tab-item'+(S.stTab===i?' active':'');
  var gd=S.grpDot?'<span class="notif-dot"></span>':'';
  items[2].innerHTML='Groups'+gd;
}

function prTab(idx){
  S.prTab=idx;
  var pc=document.getElementById('prcon');
  if(pc) pc.innerHTML=renderPrContent();
  var items=document.querySelectorAll('.tab-item');
  for(var i=0;i<3;i++) if(items[i]) items[i].className='tab-item'+(S.prTab===i?' active':'');
}

function navWk(dir){
  var nw=S.wkOff+dir;
  if(nw<-4||nw>4) return;
  S.wkOff=nw;
  if(S.wkOff===0) S.selDay=(new Date().getDay()+6)%7;
  renderApp();
}

function selDay(idx){
  S.selDay=idx;
  renderApp();
}

function gotoScene(sc){
  var btns=document.querySelectorAll('.scene-btn');
  var map={student:0,professor:1};
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  if(map[sc]!==undefined) btns[map[sc]].classList.add('active');
  if(sc==='student'){ S.view='student'; S.stTab=0; }
  else if(sc==='professor'){ S.view='professor'; S.prTab=0; }
  renderApp();
}

function onRmSrch(v){
  S.rmSrch=v;
  refreshRms();
  var inp=document.getElementById('rs');
  if(inp){ inp.focus(); inp.setSelectionRange(v.length,v.length); }
}
function clrRmSrch(){ S.rmSrch=''; refreshRms(); }
function setRmBldg(v){ S.rmBldg=v; refreshRms(); }
function setRmAvail(v){ S.rmAvail=v; refreshRms(); }
function setRmCap(v){ S.rmCap=v; refreshRms(); }

function refreshRms(){
  var isP=(S.view==='professor');
  var con=isP?document.getElementById('prcon'):document.getElementById('stcon');
  if(con){ if(isP) con.innerHTML=renderPrContent(); else con.innerHTML=renderStContent(); }
}

function findLect(id){
  for(var d=0;d<5;d++){
    var ls=LECTS[d]||[];
    for(var i=0;i<ls.length;i++) if(ls[i].id===id) return ls[i];
  }
  return null;
}
function findRoom(id){ for(var i=0;i<ROOMS.length;i++) if(ROOMS[i].id===id) return ROOMS[i]; return null; }

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  if(toastTmr) clearTimeout(toastTmr);
  toastTmr=setTimeout(function(){ t.classList.remove('show'); },2500);
}

renderApp();
</script>
</body>
</html>
